name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: LTspice finden und Schaltungen simulieren
        shell: powershell
        run: |
          $pfade = @(
            "$env:LOCALAPPDATA\Programs\ADI\LTspice\LTspice.exe",
            "C:\Program Files\LTC\LTspiceXVII\XVice.exe",
            "C:\Program Files (x86)\LTC\LTspiceXVII\XVice.exe"
          )
          $ltspice = $pfade | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $ltspice) {
            Write-Error "LTspice nicht gefunden. Geprueft: $($pfade -join ', ')"
            exit 1
          }
          Write-Host "LTspice gefunden: $ltspice"
          $dateien = @(
            Get-ChildItem spice_analysis\data\schematics\*.asc -ErrorAction SilentlyContinue
            Get-ChildItem spice_analysis\data\schematics\*.cir -ErrorAction SilentlyContinue
          )
          if (-not $dateien) {
            Write-Host "Keine .asc/.cir Dateien gefunden, Schritt wird uebersprungen."
            exit 0
          }
          foreach ($f in $dateien) {
            Write-Host "Simuliere: $($f.Name)"
            & $ltspice -Run -b $f.FullName
          }

      - name: .raw nach fixtures kopieren
        shell: powershell
        run: |
          $raws = Get-ChildItem spice_analysis\data\schematics\*.raw,spice_analysis\data\schematics\*.op.raw -ErrorAction SilentlyContinue
          if ($raws) {
            Copy-Item $raws spice_analysis\data\fixtures\
            Write-Host "$($raws.Count) .raw Datei(en) nach data\fixtures\ kopiert."
          } else {
            Write-Host "Keine .raw Dateien vorhanden, Schritt wird uebersprungen."
          }

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install -e ".[dev]"
        working-directory: spice_analysis

      - name: Tests ausführen
        run: pytest
        working-directory: spice_analysis

      - name: .raw Dateien in Projektordner zurückkopieren
        if: always()
        shell: powershell
        run: |
          $ziel = "C:\Users\Trist\OneDrive\Dokumente\Projekte\Programme\ALTSS\spice_analysis\data\fixtures"
          if (-not (Test-Path $ziel)) {
            New-Item -ItemType Directory -Path $ziel -Force | Out-Null
          }
          $raws = Get-ChildItem spice_analysis\data\fixtures\*.raw -ErrorAction SilentlyContinue
          if ($raws) {
            Copy-Item $raws $ziel -Force
            Write-Host "$($raws.Count) .raw Datei(en) nach $ziel kopiert."
          } else {
            Write-Host "Keine .raw Dateien zum Zurueckkopieren gefunden."
          }
