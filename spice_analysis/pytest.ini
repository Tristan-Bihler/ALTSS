[pytest]
testpaths = tests
addopts   = --tb=short -q --cov=src/spice_analysis --cov-report=term-missing
markers =
    unit: schnelle Unit-Tests ohne LTspice
    regression: Regressionstests gegen echte .raw Dateien
    spannungsteiler: Tests fuer die Spannungsteiler-Schaltung
    ac_daempfer: Tests fuer den AC-Daempfer 10Vp -> 5Vp
